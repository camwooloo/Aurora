<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#0b0e14" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23ff9f1c'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-velocity@2.0.0/dist/leaflet-velocity.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-velocity@2.0.0/dist/leaflet-velocity.js"></script>
  <style>/* =====================================================================
   AuroraCast — responsive styles (desktop + tablet + mobile)
   ===================================================================== */

:root{
  --bg:#0b0e14;
  --bg-elev:#131822;
  --bg-elev-2:#1b2230;
  --line:#252c3a;
  --text:#e6eaf2;
  --text-dim:#9aa3b2;
  --accent:#ff9f1c;
  --accent-2:#ffb347;
  --good:#5cd389;
  --bad:#ff6b6b;
  --blue:#4aa3ff;
  --panel-shadow: 0 20px 50px rgba(0,0,0,.55);

  --rail-w: 52px;
  --topbar-h: 44px;
  --detail-w: 320px;
  --timeline-h: 92px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}

*{box-sizing:border-box}
html,body,#main{margin:0;padding:0;height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:"Inter","Segoe UI",system-ui,-apple-system,BlinkMacSystemFont,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;text-size-adjust:100%}
button{font-family:inherit;color:inherit;background:none;border:0;cursor:pointer;padding:0}
input{font-family:inherit;color:inherit}
a{color:var(--accent);text-decoration:none}

/* Root app shell */
.app{position:fixed;inset:0;overflow:hidden}
#map{position:absolute;inset:0;background:#07090d;z-index:1}
.leaflet-container{background:#07090d;font-family:inherit;outline:none}
.leaflet-control-attribution{background:rgba(11,14,20,.72)!important;color:#8a92a3!important;font-size:10px;padding:2px 6px!important}
.leaflet-control-attribution a{color:#a9b3c4!important}
.leaflet-control-zoom{display:none}
#windcanvas{position:absolute;inset:0;pointer-events:none;z-index:350}

/* =======================================================================
   Top bar
   ======================================================================= */
.topbar{
  position:absolute;top:calc(12px + var(--safe-top));left:calc(var(--rail-w) + 20px);
  right:calc(var(--detail-w) + 20px);z-index:900;
  display:flex;gap:12px;align-items:center;pointer-events:none;
}
.brand{
  pointer-events:auto;display:flex;align-items:center;gap:10px;
  background:var(--bg-elev);border:1px solid var(--line);
  padding:8px 14px;border-radius:10px;box-shadow:var(--panel-shadow);white-space:nowrap;
}
.brand .logo{
  width:28px;height:28px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#ffd08a,#ff9f1c 60%,#c96a00);
  display:grid;place-items:center;color:#2a1500;font-weight:900;font-size:15px;
  box-shadow:0 0 0 2px rgba(255,159,28,.15), 0 0 18px rgba(255,159,28,.45) inset;
}
.brand .name{font-weight:800;letter-spacing:.2px}
.brand .name small{color:var(--text-dim);font-weight:500;margin-left:4px}
.premium-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,#3a2a00,#6a4a00);
  border:1px solid #ffb347;color:#ffd799;
  font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px;
  text-transform:uppercase;letter-spacing:.6px;
}
.premium-pill::before{content:"♛";font-size:12px;color:#ffd08a}

.searchbar{
  pointer-events:auto;flex:1;max-width:460px;position:relative;
  background:var(--bg-elev);border:1px solid var(--line);border-radius:10px;
  display:flex;align-items:center;padding:0 12px;height:var(--topbar-h);box-shadow:var(--panel-shadow);
}
.searchbar svg{opacity:.7;flex:none;color:var(--text)}
.searchbar input{
  flex:1;background:transparent;border:0;outline:0;color:var(--text);
  padding:0 10px;font-size:14px;height:100%;min-width:0;
}
.searchbar .kbd{color:var(--text-dim);font-size:11px;border:1px solid var(--line);padding:2px 6px;border-radius:6px}
.search-results{
  position:absolute;top:calc(var(--topbar-h) + 6px);left:0;right:0;
  background:var(--bg-elev);border:1px solid var(--line);border-radius:10px;
  max-height:320px;overflow:auto;box-shadow:var(--panel-shadow);
}
.search-results .item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:8px}
.search-results .item:last-child{border-bottom:0}
.search-results .item:hover,.search-results .item:active{background:var(--bg-elev-2)}
.search-results .item .muted{color:var(--text-dim);font-size:12px}

/* =======================================================================
   Left rail (desktop)
   ======================================================================= */
.rail{
  position:absolute;top:calc(12px + var(--safe-top));left:12px;
  bottom:calc(var(--timeline-h) + 24px + var(--safe-bottom));
  width:var(--rail-w);z-index:900;
  background:var(--bg-elev);border:1px solid var(--line);border-radius:12px;
  display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:4px;
  box-shadow:var(--panel-shadow);
}
.rail button{
  width:40px;height:40px;border-radius:10px;color:var(--text-dim);
  display:grid;place-items:center;transition:all .15s;position:relative;
}
.rail button:hover{background:var(--bg-elev-2);color:var(--text)}
.rail button.active{background:rgba(255,159,28,.15);color:var(--accent)}
.rail .sep{width:28px;height:1px;background:var(--line);margin:6px 0}
.rail .tip{
  position:absolute;left:48px;top:50%;transform:translateY(-50%);
  background:var(--bg-elev-2);padding:4px 8px;border-radius:6px;font-size:12px;white-space:nowrap;
  border:1px solid var(--line);pointer-events:none;opacity:0;transition:opacity .15s;z-index:10;
}
.rail button:hover .tip{opacity:1}

/* =======================================================================
   Layer menu
   ======================================================================= */
.layer-menu{
  position:absolute;left:calc(var(--rail-w) + 20px);top:70px;z-index:950;width:340px;
  background:var(--bg-elev);border:1px solid var(--line);border-radius:12px;
  padding:14px;box-shadow:var(--panel-shadow);
}
.layer-menu h4{margin:0 0 8px;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim)}
.layer-menu h4:not(:first-child){margin-top:14px}
.layer-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.layer-grid button{
  padding:10px 4px;border-radius:8px;background:var(--bg-elev-2);border:1px solid transparent;
  display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11px;color:var(--text-dim);
  transition:all .15s;
}
.layer-grid button .ico{font-size:18px}
.layer-grid button.active{border-color:var(--accent);color:var(--accent);background:rgba(255,159,28,.08)}
.layer-grid button:hover{color:var(--text)}
.model-row{display:flex;gap:6px;flex-wrap:wrap}
.model-row button{
  padding:6px 10px;border-radius:8px;background:var(--bg-elev-2);font-size:12px;color:var(--text-dim);
  border:1px solid transparent;transition:all .15s;
}
.model-row button.active{border-color:var(--accent);color:var(--accent)}
.model-row button:hover{color:var(--text)}

/* =======================================================================
   Detail panel (right)
   ======================================================================= */
.detail{
  position:absolute;top:calc(12px + var(--safe-top));right:12px;
  bottom:calc(var(--timeline-h) + 24px + var(--safe-bottom));
  width:var(--detail-w);z-index:900;
  background:var(--bg-elev);border:1px solid var(--line);border-radius:12px;
  overflow:hidden;box-shadow:var(--panel-shadow);
  display:flex;flex-direction:column;
}
.detail .hdr{padding:14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.detail .hdr .place{font-size:16px;font-weight:700;line-height:1.15}
.detail .hdr .coord{color:var(--text-dim);font-size:11px;margin-top:2px;font-variant-numeric:tabular-nums}
.detail .hdr button{color:var(--text-dim);padding:4px 8px;border-radius:6px}
.detail .hdr button:hover{background:var(--bg-elev-2);color:var(--text)}

.nowcard{padding:14px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,rgba(74,163,255,.10),transparent);border-bottom:1px solid var(--line)}
.nowcard .temp{font-size:40px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.nowcard .temp small{font-size:16px;color:var(--text-dim);margin-left:2px;font-weight:500}
.nowcard .cond{color:var(--text-dim);font-size:12px;margin-top:4px}
.nowcard .ico{font-size:48px}

.quickstats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 14px;border-bottom:1px solid var(--line)}
.quickstats .s{background:var(--bg-elev-2);padding:8px;border-radius:8px}
.quickstats .s .l{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px}
.quickstats .s .v{font-size:14px;font-weight:700;margin-top:2px;font-variant-numeric:tabular-nums}

.tabs{display:flex;border-bottom:1px solid var(--line)}
.tabs button{flex:1;padding:10px 0;font-size:12px;color:var(--text-dim);border-bottom:2px solid transparent;font-weight:600;transition:all .15s}
.tabs button.active{color:var(--accent);border-color:var(--accent)}

.detail .scroll{flex:1;overflow:auto;-webkit-overflow-scrolling:touch}
.detail .scroll::-webkit-scrollbar{width:6px}
.detail .scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}

.day{display:grid;grid-template-columns:52px 28px 1fr 50px 50px;gap:8px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--line);font-size:13px;cursor:pointer}
.day:hover{background:var(--bg-elev-2)}
.day .dow{font-weight:700}
.day .date{color:var(--text-dim);font-size:11px}
.day .ico{font-size:18px;text-align:center}
.day .bar{position:relative;height:6px;background:var(--bg-elev-2);border-radius:3px;overflow:hidden}
.day .bar .fill{position:absolute;top:0;bottom:0;background:linear-gradient(90deg,#4aa3ff,#5cd389,#ffd166,#ff6b6b);border-radius:3px}
.day .hi{text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
.day .lo{text-align:right;color:var(--text-dim);font-variant-numeric:tabular-nums}

.hour{display:grid;grid-template-columns:48px 28px 50px 1fr 40px;gap:8px;align-items:center;padding:8px 14px;border-bottom:1px solid var(--line);font-size:12px;font-variant-numeric:tabular-nums}
.hour:hover{background:var(--bg-elev-2)}
.hour .t{color:var(--text-dim)}
.hour .ico{text-align:center}
.hour .temp{font-weight:700}
.hour .wind{color:var(--text-dim);display:flex;align-items:center;gap:6px}
.hour .wind .arr{display:inline-block;color:var(--accent);transform-origin:center}
.hour .rain{text-align:right;color:var(--blue)}

.empty{padding:24px;text-align:center;color:var(--text-dim);font-size:13px}

/* =======================================================================
   Bottom timeline
   ======================================================================= */
.timeline{
  position:absolute;left:calc(var(--rail-w) + 20px);right:calc(var(--detail-w) + 20px);
  bottom:calc(12px + var(--safe-bottom));height:var(--timeline-h);z-index:900;
  background:var(--bg-elev);border:1px solid var(--line);border-radius:12px;padding:10px 14px;
  box-shadow:var(--panel-shadow);display:flex;flex-direction:column;gap:8px;
}
.tl-top{display:flex;align-items:center;gap:10px}
.tl-top .play{width:34px;height:34px;border-radius:50%;background:var(--accent);color:#1a0f00;display:grid;place-items:center;font-weight:900;flex:none}
.tl-top .play:hover{background:var(--accent-2)}
.tl-date{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:none}
.tl-spacer{flex:1}
.tl-meta{color:var(--text-dim);font-size:12px;display:flex;gap:12px;flex-wrap:wrap;justify-content:flex-end}
.tl-meta span b{color:var(--text);font-weight:700}
.tl-track{position:relative;height:38px;background:var(--bg-elev-2);border-radius:8px;overflow:hidden;cursor:pointer;user-select:none;touch-action:none}
.tl-ticks{position:absolute;inset:0;display:flex;pointer-events:none}
.tl-ticks .tick{flex:1;border-right:1px solid rgba(255,255,255,.04);position:relative}
.tl-ticks .tick.day{border-right-color:rgba(255,255,255,.18)}
.tl-ticks .tick .lbl{position:absolute;bottom:2px;left:4px;font-size:10px;color:var(--text-dim);white-space:nowrap;pointer-events:none}
.tl-playhead{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--accent);box-shadow:0 0 10px var(--accent);pointer-events:none;transition:left .08s linear}
.tl-playhead::before{content:"";position:absolute;top:0;left:-5px;width:12px;height:12px;background:var(--accent);border-radius:50%}

/* =======================================================================
   Legend
   ======================================================================= */
.legend{
  position:absolute;left:calc(var(--rail-w) + 20px);
  bottom:calc(var(--timeline-h) + 24px + var(--safe-bottom));z-index:900;
  background:var(--bg-elev);border:1px solid var(--line);border-radius:10px;padding:8px 12px;
  display:flex;align-items:center;gap:12px;font-size:11px;color:var(--text-dim);box-shadow:var(--panel-shadow);
}
.legend .bar{width:200px;height:8px;border-radius:4px}
.legend .bar.wind{background:linear-gradient(90deg,#1a3a6e,#4aa3ff,#5cd389,#ffd166,#ff9f1c,#ff6b6b,#9b4dca)}
.legend .bar.temp{background:linear-gradient(90deg,#2a0a6b,#1a3a6e,#4aa3ff,#5cd389,#ffd166,#ff9f1c,#ff6b6b,#7a0a2e)}
.legend .bar.rain{background:linear-gradient(90deg,transparent,#4aa3ff,#1a6edb,#5a3aca,#ff6b6b)}
.legend .bar.clouds{background:linear-gradient(90deg,#0b0e14,#3a4050,#8a92a3,#e6eaf2)}
.legend .bar.pressure{background:linear-gradient(90deg,#5a3aca,#4aa3ff,#5cd389,#ffd166,#ff6b6b)}
.legend .bar.waves{background:linear-gradient(90deg,#0b1629,#4aa3ff,#5cd389,#ffd166,#ff6b6b)}
.legend .bar.snow{background:linear-gradient(90deg,#0b0e14,#4a5a70,#aabad0,#ffffff)}

/* =======================================================================
   Premium modal
   ======================================================================= */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:16px}
.modal{width:min(420px,100%);background:var(--bg-elev);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.7);position:relative;max-height:calc(100vh - 32px);overflow-y:auto}
.modal .hero{padding:18px 20px;background:linear-gradient(135deg,#2a1c00,#4a2e00);display:flex;align-items:center;gap:12px}
.modal .hero .logo{width:42px;height:42px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#ffd08a,#ff9f1c 60%,#c96a00);display:grid;place-items:center;color:#2a1500;font-weight:900;font-size:20px}
.modal .hero h2{margin:0;font-size:20px}
.modal .hero p{margin:2px 0 0;color:#ffd799;font-size:13px}
.modal .body{padding:18px 20px}
.modal ul{list-style:none;padding:0;margin:0 0 14px}
.modal ul li{padding:6px 0;display:flex;gap:10px;align-items:flex-start;font-size:13px}
.modal ul li::before{content:"✓";color:var(--good);font-weight:900}
.modal .tier{border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.modal .tier.active{background:linear-gradient(135deg,#2a1a0a,#3a2510);border-color:var(--accent)}
.modal .tier .t{font-weight:700}
.modal .tier .sub{color:var(--text-dim);font-size:12px}
.modal .tier .price{font-weight:800;font-size:16px}
.modal .cta{width:100%;padding:12px;border-radius:10px;background:var(--accent);color:#2a1500;font-weight:800;margin-top:10px}
.modal .cta:hover{background:var(--accent-2)}
.modal .foot{padding:0 20px 18px;color:var(--text-dim);font-size:11px;text-align:center}
.modal .close{position:absolute;top:12px;right:12px;color:#fff;font-size:18px;padding:4px 8px;z-index:2}

/* =======================================================================
   Leaflet popups
   ======================================================================= */
.leaflet-popup-content-wrapper{background:var(--bg-elev)!important;color:var(--text)!important;border:1px solid var(--line);border-radius:10px;box-shadow:var(--panel-shadow)}
.leaflet-popup-tip{background:var(--bg-elev)!important}
.leaflet-popup-content{margin:10px 14px!important;font-size:13px;min-width:180px}
.leaflet-popup-content .pp-t{font-weight:700;margin-bottom:4px}
.leaflet-popup-content .pp-r{display:flex;justify-content:space-between;color:var(--text-dim);font-size:12px}
.leaflet-popup-content .pp-r b{color:var(--text);font-weight:600}

/* =======================================================================
   Toast
   ======================================================================= */
.toast{position:absolute;bottom:calc(var(--timeline-h) + 40px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(10px);z-index:3000;background:var(--bg-elev-2);border:1px solid var(--line);color:var(--text);padding:10px 14px;border-radius:10px;font-size:13px;box-shadow:var(--panel-shadow);opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;max-width:calc(100vw - 32px);text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* =======================================================================
   Mobile bottom nav (hidden on desktop)
   ======================================================================= */
.mobnav{display:none}

/* =======================================================================
   Responsive breakpoints
   ======================================================================= */

/* Tablet */
@media (max-width: 1100px){
  :root{--detail-w: 280px}
  .tl-meta span:nth-child(3),.tl-meta span:nth-child(4){display:none}
}

/* Mobile */
@media (max-width: 820px){
  :root{
    --rail-w: 0px;
    --detail-w: 0px;
    --timeline-h: 76px;
  }

  .topbar{
    top:calc(8px + var(--safe-top));left:8px;right:8px;gap:8px;
  }
  .brand{padding:6px 10px}
  .brand .name small{display:none}
  .premium-pill{display:none}

  .rail{display:none}

  /* Layer menu becomes a bottom sheet */
  .layer-menu{
    left:8px;right:8px;top:auto;bottom:calc(var(--timeline-h) + 70px + var(--safe-bottom));
    width:auto;max-height:50vh;overflow:auto;
  }

  /* Detail panel → full-screen bottom sheet */
  .detail{
    top:auto;right:8px;left:8px;width:auto;
    bottom:calc(var(--timeline-h) + 70px + var(--safe-bottom));
    max-height:60vh;
  }
  .detail.collapsed{display:none}

  .timeline{
    left:8px;right:8px;
    bottom:calc(60px + var(--safe-bottom));
    padding:8px 10px;height:var(--timeline-h);
  }
  .tl-top .play{width:30px;height:30px;font-size:12px}
  .tl-date{font-size:12px}
  .tl-meta{display:none}

  .legend{
    left:8px;right:8px;bottom:calc(var(--timeline-h) + 68px + var(--safe-bottom));
    justify-content:center;padding:6px 10px;
  }
  .legend .bar{width:140px}

  .toast{bottom:calc(var(--timeline-h) + 70px + var(--safe-bottom))}

  /* Mobile bottom nav */
  .mobnav{
    display:flex;position:absolute;left:0;right:0;bottom:0;z-index:950;
    height:calc(56px + var(--safe-bottom));padding-bottom:var(--safe-bottom);
    background:var(--bg-elev);border-top:1px solid var(--line);
    justify-content:space-around;align-items:center;
  }
  .mobnav button{
    flex:1;height:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;color:var(--text-dim);font-size:10px;font-weight:600;
  }
  .mobnav button.active{color:var(--accent)}
  .mobnav button svg{width:20px;height:20px}
}

/* Very small phones */
@media (max-width: 380px){
  .brand .name{font-size:12px}
  .searchbar input{font-size:13px}
  .nowcard .temp{font-size:32px}
}

/* High-DPI / retina crispness for canvas */
@media (min-resolution: 2dppx){
  .leaflet-tile{image-rendering:auto}
}
</style>
</head>
<body><div id="main"></div><script>/* =====================================================================
   AuroraCast — map controller (Leaflet + wind particles + API bridge)
   Exposes window.AuroraMap. Called from Rust via dioxus::document::eval.
   ===================================================================== */
(function () {
  'use strict';

  const state = {
    map: null,
    velocityLayer: null,
    rainLayer: null,
    satLayer: null,
    tempLayer: null,
    cloudLayer: null,
    overlayLayer: null,
    rainFrames: [],
    satFrames: [],
    markers: [],
    currentLayer: 'wind',
    pendingInit: null,
  };

  const WIND_JSON_URL = 'https://onaci.github.io/leaflet-velocity/wind-global.json';

  // -------- helpers ----------------------------------------------------
  function waitForLeaflet() {
    return new Promise((resolve) => {
      if (window.L && window.L.velocityLayer) return resolve();
      const iv = setInterval(() => {
        if (window.L && window.L.velocityLayer) {
          clearInterval(iv);
          resolve();
        }
      }, 50);
    });
  }

  function emit(name, detail) {
    window.dispatchEvent(new CustomEvent('aurora:' + name, { detail }));
  }

  // -------- initialize -------------------------------------------------
  function debug(msg) {
    console.log('[AuroraMap] ' + msg);
    const el = document.getElementById('aurora-debug');
    if (el) el.textContent = msg;
  }

  function showDebugBanner(msg) {
    let el = document.getElementById('aurora-debug');
    if (!el) {
      el = document.createElement('div');
      el.id = 'aurora-debug';
      el.style.cssText = 'position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:#131822;color:#e6eaf2;padding:6px 12px;border:1px solid #252c3a;border-radius:8px;font:11px/1.4 monospace;z-index:9999;pointer-events:none;opacity:.9;max-width:90vw';
      document.body.appendChild(el);
    }
    el.textContent = msg;
  }

  async function init(containerId) {
    showDebugBanner('init: waiting for Leaflet…');
    await waitForLeaflet();
    showDebugBanner('init: Leaflet loaded');

    const el = document.getElementById(containerId);
    if (!el) {
      showDebugBanner('init: #' + containerId + ' not found');
      return;
    }
    const rect = el.getBoundingClientRect();
    showDebugBanner('init: #map found, size ' + Math.round(rect.width) + '×' + Math.round(rect.height));

    if (state.map) { state.map.remove(); state.map = null; }

    try {
      state.map = L.map(el, {
        center: [46.5, 8], zoom: 4, minZoom: 2, maxZoom: 12,
        worldCopyJump: true, zoomControl: false, preferCanvas: true,
        attributionControl: true, tap: true,
      });
    } catch (e) {
      showDebugBanner('init error: ' + e.message);
      return;
    }
    showDebugBanner('init: Leaflet map created');
    L.control.attribution({
      prefix: 'AuroraCast · Data: Open-Meteo, RainViewer, OpenStreetMap',
    }).addTo(state.map);

    // Base layers (dark map, then a dedicated top-level pane for labels so
    // they sit ABOVE weather overlays — otherwise cloud imagery washes them
    // out and countries become hard to read.)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd', maxZoom: 19, opacity: 0.95,
    }).addTo(state.map);

    if (!state.map.getPane('aurora-labels')) {
      const pane = state.map.createPane('aurora-labels');
      pane.style.zIndex = 650;   // above overlays (360) + markers (600)
      pane.style.pointerEvents = 'none';
      // Subtle drop-shadow makes labels pop on any overlay background.
      pane.style.filter = 'drop-shadow(0 0 1px rgba(0,0,0,.9))';
    }
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd', maxZoom: 19, pane: 'aurora-labels',
    }).addTo(state.map);

    // Initialize wind particles
    try {
      const r = await fetch(WIND_JSON_URL);
      const data = await r.json();
      state.velocityLayer = L.velocityLayer({
        displayValues: false,
        data,
        maxVelocity: 25,
        velocityScale: 0.012,
        particleAge: 80,
        lineWidth: 1.4,
        particleMultiplier: 0.004,
        colorScale: ['#1a3a6e', '#4aa3ff', '#5cd389', '#ffd166', '#ff9f1c', '#ff6b6b', '#9b4dca'],
      });
      if (state.currentLayer === 'wind') state.velocityLayer.addTo(state.map);
    } catch (e) { console.warn('wind init failed', e); }

    // RainViewer frames
    try {
      const r = await fetch('https://api.rainviewer.com/public/weather-maps.json');
      const j = await r.json();
      state.rainFrames = [...(j.radar?.past || []), ...(j.radar?.nowcast || [])]
        .map(f => j.host + f.path + '/256/{z}/{x}/{y}/2/1_1.png');
      state.satFrames = (j.satellite?.infrared || [])
        .map(f => j.host + f.path + '/256/{z}/{x}/{y}/0/0_0.png');
    } catch (_) {}

    state.map.on('click', (e) => {
      emit('mapclick', { lat: e.latlng.lat, lon: e.latlng.lng });
    });

    // Handle container resize (mobile rotation, panels toggling)
    window.addEventListener('resize', () => {
      if (state.map) state.map.invalidateSize();
    });

    // Force a resize after mount so tiles populate
    setTimeout(() => state.map && state.map.invalidateSize(), 100);

    emit('ready', {});
    showDebugBanner('map ready — tap to dismiss');
    const banner = document.getElementById('aurora-debug');
    if (banner) setTimeout(() => banner.remove(), 5000);
  }

  // -------- layer switching -------------------------------------------
  function setLayer(name) {
    state.currentLayer = name;
    if (!state.map) return;
    // remove everything
    [state.velocityLayer, state.rainLayer, state.satLayer,
     state.tempLayer, state.cloudLayer, state.overlayLayer].forEach(l => {
      if (l && state.map.hasLayer(l)) state.map.removeLayer(l);
    });
    state.rainLayer = state.satLayer = state.tempLayer = state.cloudLayer = state.overlayLayer = null;

    switch (name) {
      case 'wind':
        if (state.velocityLayer) state.velocityLayer.addTo(state.map);
        break;
      case 'rain':
        setRainFrame(Math.floor(state.rainFrames.length / 2));
        break;
      case 'satellite':
        setSatFrame(state.satFrames.length - 1);
        break;
      case 'clouds':
        // Windy-style clouds: real forecast cloud cover %, rendered as soft
        // white patches with alpha = cloud%. Basemap shows through. All 240
        // hours are fetched once, so timeline scrub is instant (no network).
        loadAndRenderClouds();
        break;
      case 'snow':
        state.overlayLayer = buildGibsLayer(
          'MODIS_Terra_NDSI_Snow_Cover',
          8, 'png', { opacity: 0.55 }
        ).addTo(state.map);
        break;
      case 'temp':
      case 'pressure':
      case 'waves':
        // Sample Open-Meteo over a grid; paint a soft heatmap overlay.
        buildGridDataOverlay(name).then(layer => {
          if (layer && state.currentLayer === name && state.map) {
            if (state.overlayLayer && state.map.hasLayer(state.overlayLayer)) {
              state.map.removeLayer(state.overlayLayer);
            }
            state.overlayLayer = layer.addTo(state.map);
          }
        });
        scheduleGridRefresh(name);
        break;
    }
  }

  function setRainFrame(i) {
    if (state.rainLayer) state.map.removeLayer(state.rainLayer);
    if (!state.rainFrames.length) return;
    const idx = Math.max(0, Math.min(state.rainFrames.length - 1, i));
    state.rainLayer = L.tileLayer(state.rainFrames[idx], { opacity: 0.75, maxZoom: 12 }).addTo(state.map);
  }
  function setSatFrame(i) {
    if (state.satLayer) state.map.removeLayer(state.satLayer);
    if (!state.satFrames.length) return;
    const idx = Math.max(0, Math.min(state.satFrames.length - 1, i));
    state.satLayer = L.tileLayer(state.satFrames[idx], { opacity: 0.7, maxZoom: 12 }).addTo(state.map);
  }
  // Clouds use the same IR satellite source but in its own layer slot with
  // a lower opacity so the basemap stays readable underneath.
  function setCloudFrame(i) {
    if (state.cloudLayer) state.map.removeLayer(state.cloudLayer);
    if (!state.satFrames.length) return;
    const idx = Math.max(0, Math.min(state.satFrames.length - 1, i));
    state.cloudLayer = L.tileLayer(state.satFrames[idx], {
      opacity: 0.55,  // lighter than the Satellite layer so map shows through
      maxZoom: 12,
    }).addTo(state.map);
  }

  function setTime(hourOffset, totalHours) {
    if (!state.map) return;
    const frac = hourOffset / totalHours;
    if (state.currentLayer === 'rain' && state.rainFrames.length) {
      setRainFrame(Math.floor(frac * state.rainFrames.length));
    }
    if (state.currentLayer === 'satellite' && state.satFrames.length) {
      setSatFrame(Math.floor(frac * state.satFrames.length));
    }
    if (state.currentLayer === 'clouds') {
      if (cloudGrid) {
        // Pure canvas re-paint from cached forecast → smooth dragging
        const hours = (cloudGrid.hourly[0] || []).length;
        const h = Math.min(hours - 1, Math.max(0, hourOffset));
        renderCloudFrame(h);
      } else {
        loadAndRenderClouds();  // first call triggers the fetch
      }
    }
    if (state.currentLayer === 'snow') {
      // Step snow overlay one MODIS frame per day of timeline offset.
      const d = gibsDateFromHourOffset(hourOffset);
      if (state.overlayLayer && state.map.hasLayer(state.overlayLayer)) {
        state.map.removeLayer(state.overlayLayer);
      }
      state.overlayLayer = buildGibsLayer(
        'MODIS_Terra_NDSI_Snow_Cover', 8, 'png', { opacity: 0.55, date: d }
      ).addTo(state.map);
    }
    if (state.currentLayer === 'wind' && state.velocityLayer) {
      try { state.velocityLayer.setOptions({ particleAge: 60 + ((hourOffset * 7) % 50) }); }
      catch (_) {}
    }
  }

  function panTo(lat, lon, zoom) {
    if (!state.map) return;
    state.map.flyTo([lat, lon], zoom || Math.max(state.map.getZoom(), 7), { duration: 0.8 });
  }

  function showPopup(lat, lon, html) {
    if (!state.map) return;
    L.popup({ className: 'ac-popup', maxWidth: 260 })
      .setLatLng([lat, lon])
      .setContent(html)
      .openOn(state.map);
  }

  function invalidate() {
    if (state.map) state.map.invalidateSize();
  }

  // -------- Windy-style cloud overlay (Open-Meteo forecast grid) ------
  // Fetches hourly cloud cover % for a grid of points covering the map,
  // then paints soft white circles (alpha = cloud%) onto a canvas. Scrubbing
  // the timeline is instant because all 240 hours are cached locally.
  let cloudGrid = null;           // {lats, lons, hourly[point][hour], bounds}
  let cloudHourIdx = 0;
  let cloudLoading = false;
  let cloudAbort = null;

  async function loadAndRenderClouds() {
    if (!state.map) return;
    // Reuse cache if viewport still roughly covered
    const vb = state.map.getBounds();
    if (cloudGrid && cloudGrid.bounds.contains(vb.getCenter())) {
      renderCloudFrame(cloudHourIdx);
      return;
    }
    if (cloudLoading) return;
    cloudLoading = true;
    if (cloudAbort) cloudAbort.abort();
    cloudAbort = new AbortController();

    // Build a grid covering ~2x the visible viewport so pans feel continuous.
    const pad = 0.8;
    const cLat = (vb.getNorth() + vb.getSouth()) / 2;
    const cLon = (vb.getWest() + vb.getEast()) / 2;
    const halfH = (vb.getNorth() - vb.getSouth()) / 2 * (1 + pad);
    const halfW = (vb.getEast() - vb.getWest()) / 2 * (1 + pad);

    const ROWS = 9, COLS = 12;      // 108 points — safely under URL limit
    const lats = [], lons = [];
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const lat = Math.max(-85, Math.min(85,
          cLat + halfH - (r + 0.5) * (2 * halfH) / ROWS));
        let lon = cLon - halfW + (c + 0.5) * (2 * halfW) / COLS;
        lon = ((lon + 540) % 360) - 180;
        lats.push(lat.toFixed(3));
        lons.push(lon.toFixed(3));
      }
    }
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lats.join(',')}&longitude=${lons.join(',')}&hourly=cloud_cover&forecast_days=10&timezone=UTC`;

    showDebugBanner('Clouds: fetching forecast grid…');
    let arr;
    try {
      const r = await fetch(url, { signal: cloudAbort.signal });
      const j = await r.json();
      arr = Array.isArray(j) ? j : [j];
    } catch (e) {
      cloudLoading = false;
      if (e.name !== 'AbortError') showDebugBanner('Clouds fetch failed: ' + e.message);
      return;
    }

    cloudGrid = {
      lats: lats.map(Number),
      lons: lons.map(Number),
      hourly: arr.map(p => (p && p.hourly && p.hourly.cloud_cover) || []),
      bounds: L.latLngBounds(
        [cLat - halfH, cLon - halfW],
        [cLat + halfH, cLon + halfW]
      ),
    };
    cloudLoading = false;
    const banner = document.getElementById('aurora-debug');
    if (banner) banner.remove();
    renderCloudFrame(cloudHourIdx);
  }

  function renderCloudFrame(hourIdx) {
    if (!cloudGrid || !state.map) return;
    cloudHourIdx = hourIdx;
    const { lats, lons, hourly } = cloudGrid;

    const size = state.map.getSize();
    const W = Math.max(512, Math.round(size.x));
    const H = Math.max(384, Math.round(size.y));
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, W, H);

    // Compute pixel coords + values for this hour.
    const pts = [];
    for (let i = 0; i < lats.length; i++) {
      const px = state.map.latLngToContainerPoint([lats[i], lons[i]]);
      const val = hourly[i] && hourly[i].length > hourIdx ? hourly[i][hourIdx] : null;
      if (val == null) continue;
      pts.push({ x: px.x, y: px.y, v: val / 100 });     // v ∈ 0..1
    }

    // Radius sized so neighbors overlap → smooth field. Roughly half the
    // diagonal distance between adjacent grid points.
    const radius = Math.max(W, H) / 6;

    // Paint soft white radial gradients, alpha-scaled by cloud fraction.
    // Using 'lighter' composite so overlapping cloud patches brighten
    // additively (mimicking density).
    ctx.globalCompositeOperation = 'lighter';
    for (const p of pts) {
      const a = Math.min(0.55, p.v * 0.8);
      if (a < 0.02) continue;
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, radius);
      g.addColorStop(0,   `rgba(235, 240, 250, ${a})`);
      g.addColorStop(0.5, `rgba(235, 240, 250, ${a * 0.5})`);
      g.addColorStop(1,   'rgba(235, 240, 250, 0)');
      ctx.fillStyle = g;
      ctx.fillRect(p.x - radius, p.y - radius, radius * 2, radius * 2);
    }
    ctx.globalCompositeOperation = 'source-over';

    const vb = state.map.getBounds();
    const dataUrl = canvas.toDataURL('image/png');
    const newOverlay = L.imageOverlay(dataUrl,
      [[vb.getSouth(), vb.getWest()], [vb.getNorth(), vb.getEast()]],
      { opacity: 1, interactive: false, className: 'aurora-cloud-overlay' }
    );

    // Swap overlays in place to avoid flicker.
    const prev = state.overlayLayer;
    newOverlay.addTo(state.map);
    state.overlayLayer = newOverlay;
    if (prev && state.map.hasLayer(prev)) state.map.removeLayer(prev);
  }

  // -------- NASA GIBS satellite tiles (clouds / temp / snow) ----------
  // GIBS offers real global imagery layers as WMTS tiles, free & key-less.
  // Use yesterday's date so the processing pipeline has finished.
  function gibsDate(offsetDays = 1) {
    const d = new Date(Date.now() - offsetDays * 86400_000);
    return d.toISOString().slice(0, 10); // YYYY-MM-DD
  }

  function buildGibsLayer(layerId, maxLevel, fmt, opts) {
    opts = opts || {};
    const date = opts.date || gibsDate(1);
    const url = `https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/${layerId}/default/${date}/GoogleMapsCompatible_Level${maxLevel}/{z}/{y}/{x}.${fmt}`;

    // Dedicated pane so we can set a CSS blend mode on the tile layer. The
    // labels pane is moved above this via addLabelsOnTop().
    const paneName = 'aurora-gibs-' + (opts.blend || 'normal');
    if (!state.map.getPane(paneName)) {
      const pane = state.map.createPane(paneName);
      pane.style.zIndex = 360;
      pane.style.pointerEvents = 'none';
      if (opts.blend) pane.style.mixBlendMode = opts.blend;
    }

    return L.tileLayer(url, {
      maxZoom: 19,
      maxNativeZoom: maxLevel,
      opacity: opts.opacity != null ? opts.opacity : 0.72,
      attribution: 'NASA GIBS',
      crossOrigin: true,
      pane: paneName,
      errorTileUrl: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=',
    });
  }

  // Given a timeline hour offset (0..239, where 0 = now and larger = further
  // back in the past), produce a YYYY-MM-DD string for GIBS daily imagery.
  function gibsDateFromHourOffset(h) {
    const daysBack = Math.floor(h / 24);
    const d = new Date(Date.now() - (1 + daysBack) * 86400_000);
    return d.toISOString().slice(0, 10);
  }

  let lastCloudDate = null;
  function updateCloudsForTime(hourOffset) {
    const date = gibsDateFromHourOffset(hourOffset);
    if (date === lastCloudDate) return;
    lastCloudDate = date;
    if (state.overlayLayer && state.map.hasLayer(state.overlayLayer)) {
      state.map.removeLayer(state.overlayLayer);
    }
    state.overlayLayer = buildGibsLayer(
      'MODIS_Terra_CorrectedReflectance_TrueColor',
      9, 'jpg', { opacity: 0.9, blend: 'screen', date }
    ).addTo(state.map);
  }

  // -------- real-data grid overlay (Open-Meteo point sampling) --------
  // For layers without free tile services, sample real data on a grid
  // across the current viewport and paint a soft heatmap overlay.
  const GRID_ROWS = 8, GRID_COLS = 14;
  let gridRefreshTimer = null;
  let gridAbortCtrl = null;

  function scheduleGridRefresh(kind) {
    if (state.map && !state._gridHook) {
      state._gridHook = true;
      state.map.on('moveend zoomend', () => {
        const layer = state.currentLayer;
        if (layer === 'clouds') {
          // Re-paint from cache; refetch only if viewport drifted far
          if (cloudGrid && !cloudGrid.bounds.contains(state.map.getBounds().getCenter())) {
            cloudGrid = null;      // force refetch
          }
          loadAndRenderClouds();
          return;
        }
        if (['temp','pressure','waves'].includes(layer)) {
          clearTimeout(gridRefreshTimer);
          if (gridAbortCtrl) gridAbortCtrl.abort();
          gridRefreshTimer = setTimeout(async () => {
            const newLayer = await buildGridDataOverlay(layer);
            if (newLayer && state.currentLayer === layer && state.map) {
              if (state.overlayLayer && state.map.hasLayer(state.overlayLayer)) {
                state.map.removeLayer(state.overlayLayer);
              }
              state.overlayLayer = newLayer.addTo(state.map);
            }
          }, 700);
        }
      });
    }
  }

  async function buildGridDataOverlay(kind) {
    if (!state.map) return null;
    const bounds = state.map.getBounds();

    // Expand the sampled area beyond the visible viewport so the map shows
    // real spatial variation even when zoomed in on a region with uniform
    // weather. Pad by 1.5× in each direction.
    const pad = 1.5;
    const cLat = (bounds.getNorth() + bounds.getSouth()) / 2;
    const cLon = (bounds.getWest() + bounds.getEast()) / 2;
    const halfH = (bounds.getNorth() - bounds.getSouth()) / 2 * (1 + pad);
    const halfW = (bounds.getEast() - bounds.getWest()) / 2 * (1 + pad);
    const north = Math.min(85,  cLat + halfH);
    const south = Math.max(-85, cLat - halfH);
    const west  = cLon - halfW;
    const east  = cLon + halfW;

    const lats = [], lons = [];
    for (let r = 0; r < GRID_ROWS; r++) {
      for (let c = 0; c < GRID_COLS; c++) {
        const lat = north - (r + 0.5) * (north - south) / GRID_ROWS;
        let lon = west + (c + 0.5) * (east - west) / GRID_COLS;
        lon = ((lon + 540) % 360) - 180; // wrap to [-180, 180]
        lats.push(Math.max(-85, Math.min(85, lat)).toFixed(3));
        lons.push(lon.toFixed(3));
      }
    }

    const paramByKind = {
      temp:     { endpoint: 'forecast',         param: 'temperature_2m' },
      clouds:   { endpoint: 'forecast',         param: 'cloud_cover' },
      pressure: { endpoint: 'forecast',         param: 'surface_pressure' },
      snow:     { endpoint: 'forecast',         param: 'snow_depth' },
      waves:    { endpoint: 'marine',           param: 'wave_height' },
    };
    const cfg = paramByKind[kind];
    if (!cfg) return null;

    const host = cfg.endpoint === 'marine'
      ? 'https://marine-api.open-meteo.com/v1/marine'
      : 'https://api.open-meteo.com/v1/forecast';
    const url = `${host}?latitude=${lats.join(',')}&longitude=${lons.join(',')}&current=${cfg.param}&timezone=UTC`;

    // Cancel any previous in-flight grid fetch.
    if (gridAbortCtrl) gridAbortCtrl.abort();
    gridAbortCtrl = new AbortController();
    const signal = gridAbortCtrl.signal;

    let results;
    try {
      const r = await fetch(url, { signal });
      results = await r.json();
    } catch (e) {
      if (e.name !== 'AbortError') console.warn('grid fetch failed', e);
      return null;
    }
    if (!Array.isArray(results)) results = [results];

    // Log a summary so you can verify it's real data in DevTools.
    const vals = results.map(x => x && x.current ? x.current[cfg.param] : null).filter(v => v != null);
    if (vals.length) {
      const mn = Math.min(...vals), mx = Math.max(...vals);
      const avg = vals.reduce((a,b) => a+b, 0) / vals.length;
      console.log(`[AuroraCast] ${kind} (${cfg.param}): ${vals.length} points, min=${mn.toFixed(1)} max=${mx.toFixed(1)} avg=${avg.toFixed(1)}`);
    } else {
      console.warn('[AuroraCast] grid returned no usable values for', kind);
    }

    // Paint onto a canvas sized to the map pane, interpolating between samples.
    const size = state.map.getSize();
    const W = Math.max(256, Math.min(1280, Math.round(size.x)));
    const H = Math.max(256, Math.min(900,  Math.round(size.y)));
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    const img = ctx.createImageData(W, H);

    // Precompute pixel positions for each grid sample
    const pts = [];
    results.forEach((res, i) => {
      const lat = parseFloat(lats[i]);
      const lon = parseFloat(lons[i]);
      const val = res && res.current ? res.current[cfg.param] : null;
      if (val == null || Number.isNaN(val)) return;
      const px = state.map.latLngToContainerPoint([lat, lon]);
      pts.push({ x: px.x, y: px.y, val });
    });
    if (!pts.length) return null;

    // Inverse-distance-weighted interpolation at each pixel (cheap & smooth).
    // Downsample the canvas by 4 for speed, then upscale via CSS smoothing.
    const STEP = 4;
    for (let y = 0; y < H; y += STEP) {
      for (let x = 0; x < W; x += STEP) {
        let num = 0, den = 0;
        for (const p of pts) {
          const dx = x - p.x, dy = y - p.y;
          const d2 = dx*dx + dy*dy + 1;
          const w = 1 / (d2 * d2); // power 4 IDW → sharper local influence
          num += p.val * w;
          den += w;
        }
        const v = num / den;
        const rgb = colorForValue(kind, v);
        for (let sy = 0; sy < STEP && y + sy < H; sy++) {
          for (let sx = 0; sx < STEP && x + sx < W; sx++) {
            const i = ((y + sy) * W + (x + sx)) * 4;
            img.data[i] = rgb[0];
            img.data[i+1] = rgb[1];
            img.data[i+2] = rgb[2];
            img.data[i+3] = 170;
          }
        }
      }
    }
    ctx.putImageData(img, 0, 0);

    // The canvas was sized to the visible viewport (state.map.getSize()),
    // so the overlay must be anchored to the VISIBLE bounds, not the padded
    // ones used for sampling.
    const dataUrl = canvas.toDataURL('image/png');
    return L.imageOverlay(dataUrl,
      [[bounds.getSouth(), bounds.getWest()], [bounds.getNorth(), bounds.getEast()]],
      { opacity: 0.75, interactive: false, className: 'aurora-grid-overlay' }
    );
  }

  function colorForValue(kind, v) {
    // Stops: array of [thresholdValue, [r,g,b]]
    const stops = ({
      temp: [                  // °C
        [-40, [42, 10, 107]],
        [-20, [26, 58, 110]],
        [-5,  [74, 163, 255]],
        [5,   [92, 211, 137]],
        [15,  [255, 209, 102]],
        [25,  [255, 159, 28]],
        [35,  [255, 107, 107]],
        [45,  [122, 10, 46]],
      ],
      clouds: [                // 0-100 %
        [0,   [15, 20, 30]],
        [25,  [58, 64, 80]],
        [50,  [138, 146, 163]],
        [75,  [200, 210, 222]],
        [100, [240, 244, 250]],
      ],
      pressure: [              // hPa
        [960,  [90, 58, 202]],
        [990,  [74, 163, 255]],
        [1013, [92, 211, 137]],
        [1025, [255, 209, 102]],
        [1045, [255, 107, 107]],
      ],
      snow: [                  // m
        [0,    [20, 25, 40]],
        [0.01, [80, 100, 140]],
        [0.1,  [170, 190, 220]],
        [0.5,  [230, 240, 255]],
        [2,    [255, 255, 255]],
      ],
      waves: [                 // m
        [0,   [10, 20, 40]],
        [1,   [74, 163, 255]],
        [2.5, [92, 211, 137]],
        [4,   [255, 209, 102]],
        [7,   [255, 107, 107]],
      ],
    })[kind];
    for (let i = 0; i < stops.length - 1; i++) {
      if (v <= stops[i][0]) return stops[i][1];
      if (v <= stops[i+1][0]) {
        const a = stops[i], b = stops[i+1];
        const t = (v - a[0]) / (b[0] - a[0]);
        return [
          a[1][0] + (b[1][0] - a[1][0]) * t,
          a[1][1] + (b[1][1] - a[1][1]) * t,
          a[1][2] + (b[1][2] - a[1][2]) * t,
        ];
      }
    }
    return stops[stops.length - 1][1];
  }

  // -------- legacy procedural gradient overlay (kept as fallback) ------
  function buildGradientOverlay(kind) {
    // Smaller canvas → smaller dataURL → renders reliably in the webview.
    const W = 720, H = 360;
    const c = document.createElement('canvas');
    c.width = W; c.height = H;
    const ctx = c.getContext('2d');
    const img = ctx.createImageData(W, H);
    const seed = (kind.charCodeAt(0) * 17.3) + (kind.charCodeAt(1) * 3.7);
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const nx = x / W, ny = y / H;
        // 4-octave noise
        let v = 0, amp = 1, frq = 1;
        for (let o = 0; o < 4; o++) {
          v += amp * Math.sin((nx * frq * 6.28 + seed) + Math.cos((ny * frq * 6.28 + seed * 0.7)));
          amp *= 0.5; frq *= 2;
        }
        v = (v + 2) / 4;             // normalize to ~0..1
        const lat = 90 - ny * 180;   // -90..+90
        const absLat = Math.abs(lat);
        let k = v;
        if (kind === 'pressure') k = 0.5 + 0.35 * Math.sin((lat / 30) * Math.PI) + 0.2 * v;
        if (kind === 'waves')    k = Math.max(0, absLat / 90 - 0.2) * 0.6 + v * 0.4;
        if (kind === 'snow')     k = Math.max(0, (absLat - 40) / 50) * 0.8 + v * 0.2;
        if (kind === 'temp')     k = (1 - absLat / 90) * 0.8 + 0.1 + (v - 0.5) * 0.25;
        if (kind === 'clouds')   k = 0.15 + v * 0.85;
        const rgb = gradient(Math.max(0, Math.min(1, k)), kind);
        const i = (y * W + x) * 4;
        img.data[i]     = rgb[0];
        img.data[i + 1] = rgb[1];
        img.data[i + 2] = rgb[2];
        img.data[i + 3] = 215; // noticeably visible alpha
      }
    }
    ctx.putImageData(img, 0, 0);
    return L.imageOverlay(c.toDataURL('image/png'), [[-85, -180], [85, 180]], {
      opacity: 0.85,
      interactive: false,
      className: 'aurora-gradient-overlay',
    });
  }
  function gradient(t, kind) {
    t = Math.max(0, Math.min(1, t));
    const stops = ({
      pressure: [[0, [90, 58, 202]], [.35, [74, 163, 255]], [.55, [92, 211, 137]], [.75, [255, 209, 102]], [1, [255, 107, 107]]],
      waves:    [[0, [10, 20, 40]],  [.3,  [74, 163, 255]], [.6,  [92, 211, 137]], [.85, [255, 209, 102]], [1, [255, 107, 107]]],
      snow:     [[0, [10, 15, 25]],  [.2,  [80, 100, 130]], [.5,  [170, 190, 210]], [.8, [220, 230, 245]],  [1, [255, 255, 255]]],
      temp:     [[0, [42, 10, 107]], [.2,  [26, 58, 110]],  [.4,  [74, 163, 255]],  [.55,[92, 211, 137]],   [.7, [255, 209, 102]], [.85, [255, 107, 107]], [1, [122, 10, 46]]],
      clouds:   [[0, [11, 14, 20]],  [.3,  [58, 64, 80]],   [.6,  [138, 146, 163]], [1,  [230, 234, 242]]],
    })[kind];
    for (let i = 0; i < stops.length - 1; i++) {
      if (t >= stops[i][0] && t <= stops[i + 1][0]) {
        const a = stops[i], b = stops[i + 1];
        const k = (t - a[0]) / (b[0] - a[0]);
        return [a[1][0] + (b[1][0] - a[1][0]) * k,
                a[1][1] + (b[1][1] - a[1][1]) * k,
                a[1][2] + (b[1][2] - a[1][2]) * k];
      }
    }
    return [255, 255, 255];
  }

  // -------- data fetchers (shared across platforms) -------------------
  async function geocode(query) {
    const r = await fetch(
      `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=8&language=en&format=json`
    );
    const j = await r.json();
    return j.results || [];
  }

  async function reverseGeocode(lat, lon) {
    try {
      const r = await fetch(
        `https://geocoding-api.open-meteo.com/v1/reverse?latitude=${lat}&longitude=${lon}&language=en&format=json`
      );
      const j = await r.json();
      return (j.results || [])[0] || null;
    } catch (_) { return null; }
  }

  async function forecast(lat, lon, model) {
    const modelMap = {
      ecmwf: 'ecmwf_ifs025',
      gfs: 'gfs_seamless',
      icon: 'icon_seamless',
      ukmo: 'ukmo_seamless',
    };
    const p = new URLSearchParams({
      latitude: lat, longitude: lon,
      current: 'temperature_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,relative_humidity_2m,surface_pressure,cloud_cover,precipitation',
      hourly: 'temperature_2m,weather_code,wind_speed_10m,wind_direction_10m,precipitation_probability,precipitation',
      daily: 'weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,wind_speed_10m_max,sunrise,sunset',
      timezone: 'auto',
      forecast_days: 10,
      models: modelMap[model] || 'best_match',
      wind_speed_unit: 'kmh',
      temperature_unit: 'celsius',
    });
    const r = await fetch('https://api.open-meteo.com/v1/forecast?' + p.toString());
    return await r.json();
  }

  async function quickCurrent(lat, lon) {
    const r = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code,wind_speed_10m,wind_direction_10m&wind_speed_unit=kmh`
    );
    return await r.json();
  }

  // -------- expose -----------------------------------------------------
  window.AuroraMap = {
    init, setLayer, setTime, panTo, showPopup, invalidate,
    geocode, reverseGeocode, forecast, quickCurrent,
  };

  // Smooth timeline drag. To feel responsive we:
  //   1. Update the playhead DOM directly on every pointermove (no roundtrip)
  //   2. Throttle the aurora:timeline event that syncs Rust state (~60 Hz)
  //   3. Always send a final event on pointerup so state is authoritative
  function setupTimelineDrag(track) {
    if (!track || track._auroraDragWired) return;
    track._auroraDragWired = true;

    let dragging = false;
    let lastFrac = 0;
    let lastSyncAt = 0;
    const SYNC_INTERVAL_MS = 60;

    const visualUpdate = (frac) => {
      const head = document.querySelector('.tl-playhead');
      if (head) head.style.left = (frac * 100) + '%';
    };
    const syncToRust = (frac) => {
      window.dispatchEvent(new CustomEvent('aurora:timeline', { detail: frac }));
    };
    const fracOf = (clientX) => {
      const r = track.getBoundingClientRect();
      return Math.max(0, Math.min(1, (clientX - r.left) / r.width));
    };

    track.addEventListener('pointerdown', (e) => {
      dragging = true;
      try { track.setPointerCapture(e.pointerId); } catch (_) {}
      const f = fracOf(e.clientX);
      lastFrac = f;
      visualUpdate(f);
      syncToRust(f);
      lastSyncAt = performance.now();
      e.preventDefault();
    });
    track.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      const f = fracOf(e.clientX);
      lastFrac = f;
      visualUpdate(f);                  // instant visual feedback
      const now = performance.now();
      if (now - lastSyncAt > SYNC_INTERVAL_MS) {
        syncToRust(f);                  // throttled state sync
        lastSyncAt = now;
      }
    });
    const end = (e) => {
      if (!dragging) return;
      dragging = false;
      try { track.releasePointerCapture(e.pointerId); } catch (_) {}
      syncToRust(lastFrac);             // authoritative final value
    };
    track.addEventListener('pointerup', end);
    track.addEventListener('pointercancel', end);
  }
  function watchTimeline() {
    const look = () => {
      const el = document.querySelector('.tl-track');
      if (el) setupTimelineDrag(el);
    };
    // Poll for the element (Rust mounts the DOM asynchronously) and keep
    // polling — Dioxus may re-mount the element.
    setInterval(look, 400);
  }

  // Auto-init: once #map appears in the DOM, initialize without waiting
  // for the Rust side. (The Rust `use_effect` also calls init; whichever
  // fires first wins — `init` is idempotent.)
  function autoInit() {
    const el = document.getElementById('map');
    if (el && !state.map) {
      init('map').catch(err => showDebugBanner('auto-init error: ' + err.message));
      watchTimeline();
      return true;
    }
    return false;
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => {
      const iv = setInterval(() => { if (autoInit()) clearInterval(iv); }, 100);
      setTimeout(() => clearInterval(iv), 20000);
    });
  } else {
    const iv = setInterval(() => { if (autoInit()) clearInterval(iv); }, 100);
    setTimeout(() => clearInterval(iv), 20000);
  }
})();
