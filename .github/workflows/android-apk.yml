name: Android APK

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'assets/**'
      - 'index.html'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dioxus.toml'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125 platform-tools'

      - name: Export NDK env
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: 'true'

      - name: Install dioxus-cli
        run: cargo install dioxus-cli --locked

      # Target aarch64-linux-android explicitly — virtually every Android
      # phone from the last ~8 years is arm64-v8a. The default dx target
      # on a Linux x86_64 runner ends up x86_64-linux-android, which only
      # installs on emulators and produces an "app not compatible" error
      # on real phones.
      - name: Build APK
        run: dx bundle --platform android --release --package-types apk --target aarch64-linux-android
        env:
          CC_aarch64_linux_android: ${{ env.ANDROID_NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ env.ANDROID_NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang

      - name: Locate and rename APK
        id: apk
        run: |
          # Prefer an arm64/aarch64 APK, fall back to whatever the build produced.
          SRC=$(find target -name '*.apk' -type f | grep -iE 'arm64|aarch64' | head -1)
          if [ -z "$SRC" ]; then SRC=$(find target -name '*.apk' -type f | head -1); fi
          mkdir -p dist-android
          cp "$SRC" dist-android/AuroraCast.apk
          echo "path=dist-android/AuroraCast.apk" >> "$GITHUB_OUTPUT"
          echo "Found APK at: $SRC -> dist-android/AuroraCast.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AuroraCast-android
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - name: Publish to rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Android (latest main)
          body: |
            Debug-signed APK built from the latest `main` commit, targeting
            arm64-v8a (aarch64) — covers virtually all modern Android phones.

            Install: enable "Install unknown apps" for your browser (or adb
            sideload) and open the downloaded file.
          files: ${{ steps.apk.outputs.path }}
          prerelease: false
